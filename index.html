<body>

    <section>
        <div class="main">
            <h1>BMI Calculator</h1>
            <p>Click the button below to calculate your BMI</p>
            <div>
                <div class="input">
                    <label>Weight (kg)</label>
                    <input type="number" id="weight" placeholder="Enter Weight">
                </div>
                <div class="input">
                    <label>Height (cm)</label>
                    <input type="number" id="height" placeholder="Enter Height">
                </div>
            </div>
            <button onclick="btn()"><p>Calculate BMI</p></button>

            <p id="result">Result Appears Here</p>

            <button onclick="rst()">Reset</button>

            <p id="category">Category Appears Here</p>


        </div>
    </section>


    <script src="assets/js/script.js"></script>
</body>
